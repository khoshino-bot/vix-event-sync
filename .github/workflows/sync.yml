name: イベント起案・振り返り自動同期

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      reset_processed:
        description: '処理済みキャッシュをリセット（全メールを再処理）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      notify_email:
        description: '相違通知メールを送信する'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: processed_ids.json
          key: processed-ids-${{ github.run_id }}
          restore-keys: |
            processed-ids-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリをインストール
        run: pip install google-auth google-auth-httplib2 google-api-python-client python-pptx openpyxl

      - name: 同期スクリプトを実行
        env:
          GMAIL_CLIENT_ID:      ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET:  ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN:  ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SHEETS_CLIENT_ID:     ${{ secrets.SHEETS_CLIENT_ID }}
          SHEETS_CLIENT_SECRET: ${{ secrets.SHEETS_CLIENT_SECRET }}
          SHEETS_REFRESH_TOKEN: ${{ secrets.SHEETS_REFRESH_TOKEN }}
          SPREADSHEET_ID:       ${{ secrets.SPREADSHEET_ID }}
          KPI_SPREADSHEET_ID:   ${{ secrets.KPI_SPREADSHEET_ID }}
          SENDER_DOMAIN:        "vix.co.jp"
          NOTIFY_EMAIL:         ${{ github.event.inputs.notify_email || 'false' }}
          OWNER_EMAIL:          "k.hoshino@vix.co.jp"
          # TARGET_SHEET, FILTER_YYYYMM は当月を自動検出（毎月変更不要）
          RESET_PROCESSED:      ${{ github.event.inputs.reset_processed || 'false' }}
        run: python sync_events.py
